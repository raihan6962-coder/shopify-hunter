services:
  - type: web
    name: shopify-hunter
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
```

**4.** **Commit new file** ✅

